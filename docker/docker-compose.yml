version: '3.8'

services:
  # ============ Database ============
  postgres:
    image: postgres:16-alpine
    container_name: hamahang-db
    environment:
      POSTGRES_DB: hamahang
      POSTGRES_USER: hamahang
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hamahang_secret_1403}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - hamahang-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hamahang"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ Cache ============
  redis:
    image: redis:7-alpine
    container_name: hamahang-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    networks:
      - hamahang-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============ Backend API ============
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hamahang-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: hamahang
      DB_PASSWORD: ${DB_PASSWORD:-hamahang_secret_1403}
      DB_DATABASE: hamahang
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-hamahang-jwt-secret-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-hamahang-refresh-secret-prod}
      JWT_EXPIRATION: 7d
      OTP_EXPIRY_MINUTES: 5
      OTP_MAX_ATTEMPTS: 5
      OTP_RESEND_COOLDOWN: 90
      KAVENEGAR_API_KEY: ${KAVENEGAR_API_KEY:-}
      BAZAAR_VERIFY_URL: https://pardakht.cafebazaar.ir/devapi/v2/api/validate
      VIP_SKU: hamahang_vip_monthly
      PRESET_MESSAGE_MAX_COUNT: 5
      STARTER_STICKER_COUNT: 20
      VIP_MONTHLY_STICKER_COUNT: 50
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hamahang-network

  # ============ Admin Panel ============
  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: hamahang-admin
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3000/api}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hamahang-network

  # ============ Nginx Reverse Proxy (optional) ============
  nginx:
    image: nginx:alpine
    container_name: hamahang-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - admin
    restart: unless-stopped
    networks:
      - hamahang-network
    profiles:
      - with-proxy

volumes:
  pgdata:
  redisdata:

networks:
  hamahang-network:
    driver: bridge
